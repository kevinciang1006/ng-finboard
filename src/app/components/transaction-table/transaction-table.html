<div class="table-container">
  <mat-table [dataSource]="dataSource" matSort class="w-full">

    <!-- Date Column -->
    <ng-container matColumnDef="date">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Date</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.date | date:'MMM d, y' }}</mat-cell>
    </ng-container>

    <!-- Description Column -->
    <ng-container matColumnDef="description">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Description</mat-header-cell>
      <mat-cell *matCellDef="let row" class="description-cell">{{ row.description }}</mat-cell>
    </ng-container>

    <!-- Category Column -->
    <ng-container matColumnDef="category">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Category</mat-header-cell>
      <mat-cell *matCellDef="let row">
        <span class="category-badge">{{ row.category }}</span>
      </mat-cell>
    </ng-container>

    <!-- Amount Column -->
    <ng-container matColumnDef="amount">
      <mat-header-cell *matHeaderCellDef mat-sort-header class="text-right">Amount</mat-header-cell>
      <mat-cell *matCellDef="let row" class="text-right font-mono font-medium"
        [class.amount-positive]="row.amount > 0"
        [class.amount-negative]="row.amount < 0">
        {{ row.amount | currency:'USD':'symbol':'1.2-2' }}
      </mat-cell>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="status">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Status</mat-header-cell>
      <mat-cell *matCellDef="let row">
        <mat-chip disableRipple [class]="statusColor(row.status)">
          {{ row.status }}
        </mat-chip>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row
      *matRowDef="let row; columns: displayedColumns;"
      class="table-row"
      (click)="onRowClick(row)">
    </mat-row>

  </mat-table>

  <mat-paginator
    [pageSizeOptions]="[5, 10, 20]"
    [pageSize]="10"
    showFirstLastButtons
    aria-label="Select page of transactions">
  </mat-paginator>
</div>
