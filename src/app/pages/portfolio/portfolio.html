<div class="page-layout">

  <!-- ── Page Header ──────────────────────────────────────────── -->
  <div class="page-header">
    <h1 class="page-title">Portfolio</h1>
    <p class="page-subtitle">Real-time performance overview — mock data</p>
  </div>

  <!-- ── KPI Row ──────────────────────────────────────────────── -->
  <div class="kpi-grid">
    @for (kpi of kpiCards; track kpi.label) {
      <app-kpi-card
        [label]="kpi.label"
        [value]="kpi.value"
        [delta]="kpi.delta"
        [prefix]="kpi.prefix ?? ''">
      </app-kpi-card>
    }
  </div>

  <!-- ── Line Chart (full width) ──────────────────────────────── -->
  <app-portfolio-chart (rangeChanged)="onRangeChanged($event)" />

  <!-- ── Lower Charts Row ─────────────────────────────────────── -->
  <div class="charts-row">

    <!-- Asset Allocation -->
    <div class="chart-card">
      <div class="chart-header">
        <h3 class="chart-title">Asset Allocation</h3>
        <p class="chart-subtitle">Current portfolio mix</p>
      </div>
      <div class="chart-canvas-wrapper">
        <canvas baseChart
          [data]="allocationData()"
          [options]="doughnutOptions"
          type="doughnut"
          aria-label="Asset allocation doughnut chart">
        </canvas>
      </div>
    </div>

    <!-- Monthly Returns -->
    <div class="chart-card">
      <div class="chart-header">
        <h3 class="chart-title">Monthly Returns</h3>
        <p class="chart-subtitle">% gain / loss per month</p>
      </div>
      <div class="chart-canvas-wrapper">
        <canvas baseChart
          [data]="monthlyData()"
          [options]="barOptions"
          type="bar"
          aria-label="Monthly returns bar chart">
        </canvas>
      </div>
    </div>

  </div>

</div>
