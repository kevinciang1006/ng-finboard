<div class="dashboard-layout">

  <!-- ── Page Header ──────────────────────────────────────────── -->
  <div class="page-header">
    <h1 class="page-title">Overview</h1>
    <p class="page-subtitle">Last updated: November 2025 — mock data</p>
  </div>

  <!-- ── KPI Cards Row ────────────────────────────────────────── -->
  <div class="kpi-grid">
    @for (kpi of kpiData; track kpi.label) {
      <app-kpi-card
        [label]="kpi.label"
        [value]="kpi.value"
        [delta]="kpi.delta"
        [prefix]="kpi.prefix ?? ''">
      </app-kpi-card>
    }
  </div>

  <!-- ── Portfolio Chart ──────────────────────────────────────── -->
  <app-portfolio-chart (rangeChanged)="onRangeChanged($event)" />

  <!-- ── Recent Transactions ──────────────────────────────────── -->
  <div class="table-section">
    <div class="section-header">
      <h2 class="section-title">Recent Transactions</h2>
      <p class="section-subtitle">{{ transactions.length }} transactions · November 2025</p>
    </div>
    <app-transaction-table
      [transactions]="transactions"
      (rowClicked)="onTransactionRowClicked($event)" />
  </div>

</div>
